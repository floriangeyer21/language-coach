name: Diagnose App Runner logs

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      PROJECT: ${{ vars.PROJECT || 'languagecoach' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Service statuses
        run: |
          set -euo pipefail
          aws apprunner list-services --region "$AWS_REGION" \
            --query "ServiceSummaryList[].{Name:ServiceName,Status:Status,Url:ServiceUrl}" --output table

      - name: Dump service events + application logs
        run: |
          set -euo pipefail
          for SVC in api web; do
            NAME="${PROJECT}-${SVC}"
            ARN="$(aws apprunner list-services --region "$AWS_REGION" \
              --query "ServiceSummaryList[?ServiceName=='${NAME}'].ServiceArn" --output text)"
            [ -z "$ARN" ] && { echo "== $NAME: not found =="; continue; }
            SID="${ARN##*/}"
            echo "::group::$NAME service events"
            aws logs tail "/aws/apprunner/${NAME}/${SID}/service" --region "$AWS_REGION" --since 50m 2>&1 | tail -60 || echo "no service log group"
            echo "::endgroup::"
            echo "::group::$NAME application logs"
            aws logs tail "/aws/apprunner/${NAME}/${SID}/application" --region "$AWS_REGION" --since 50m 2>&1 | tail -120 || echo "no application log group"
            echo "::endgroup::"
          done
